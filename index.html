<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshGlow Shop</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

/* Cart */
.cart {
    background: #2e8b57;
    color: white;
    padding: 10px;
    font-size: 18px;
}

/* Products */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.product {
    border: 1px solid #ddd;
    margin: 15px;
    padding: 15px;
    width: 200px;
}

.product img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

button {
    background: #2e8b57;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="cart">
    🛒 Cart Items: <span id="cart-count">0</span>
</div>

<h2>FreshGlow Products</h2>

<div class="container">

    <div class="product">
        <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6">
        <h3>Face Cream</h3>
        <p>₹299</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1585238342024-78d387f4a707">
        <h3>Glow Serum</h3>
        <p>₹499</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
        <h3>Face Wash</h3>
        <p>₹199</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd">
        <h3>Body Lotion</h3>
        <p>₹399</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

</div>

<script>
let count = 0;

function addToCart() {
    count++;
    document.getElementById("cart-count").innerText = count;
}
</script>

</body>
</html>
